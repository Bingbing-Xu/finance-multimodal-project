[training]
batch_size = 5
drop_out = 0.5
epochs = 10
device = cuda:0
seed = 789
max_grad_norm = 10
num_workers = 4
lr = 1e-3
weight_decay = 0.0

[Encoder]
encoder_type = bert
bert_path = D:/GraduateProject/ArkMSA/pretrained_models/bert-base-uncased
max_length = 400
reserve_length = 180
image_encoder = resnet50
model_type = textcnn_resnet

[TextCNN]
filter_sizes = 3,4,5
num_filters = 100

[data]
root_dir = ./data/Stock
image_dir = ./data/Stock/images
use_text = True
use_description = False
save_name =textcnn_resnet50

[multimodal]
num_classes = 3
freeze_image_encoder = false
freeze_text_encoder = false